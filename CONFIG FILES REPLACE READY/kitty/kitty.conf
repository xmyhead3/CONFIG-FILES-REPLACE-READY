# --- MacTahoe Visuals ---
font_family      JetBrains Mono
font_size        11.0
cursor_shape     beam
cursor_blink_interval 0.5

# --- Window Layout ---
window_padding_width 15
placement_strategy center
hide_window_decorations yes
# This makes it look like a borderless Mac app

# --- Transparency & Blur ---
background_opacity 0.85
# If you use a Blur extension in GNOME, this will look amazing

# --- MacTahoe Color Palette (Dark) ---
background            #1e1e1e
foreground            #ffffff
cursor                #007aff
selection_background  #3d3d3d

# Black
color0 #1e1e1e
color8 #484848
# Red (Mac Close Button)
color1 #ff5f56
color9 #ff5f56
# Green (Mac Maximize Button)
color2 #27c93f
color10 #27c93f
# Yellow (Mac Minimize Button)
color3 #ffbd2e
color11 #ffbd2e
# Blue (Mac Highlight)
color4 #007aff
color12 #007aff
# Magenta
color5 #af52bf
color13 #af52bf
# Cyan
color6 #5ac8fa
color14 #5ac8fa
# White
color7 #e4e4e4
color15 #ffffff
copy_on_select yes
