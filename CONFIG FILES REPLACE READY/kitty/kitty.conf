# --- [1] THE LIQUID ENGINE ---
# This makes the terminal feel like it's running at 144Hz+
repaint_delay 6
input_delay 1
sync_to_monitor yes
# This adds a motion blur trail to the cursor (the "Arch Rice" look)
cursor_trail 10
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 0

# --- [2] TYPOGRAPHY & LIGATURES ---
font_family      JetBrains Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0
disable_ligatures never
box_drawing_scale 0.001, 1, 1.5, 2

# --- [3] THE MAC-TAHOE "GLASS" LOOK ---
background_opacity 0.75
dynamic_background_opacity yes
# If you have GNOME Blur enabled, this will look like frosted glass
hide_window_decorations yes
window_padding_width 20
background #1e1e2e
foreground #cdd6f4

# --- [4] THE "WOW" CURSOR ---
# A thick beam that pulses like a Mac
cursor_shape beam
cursor_beam_thickness 2
cursor_blink_interval 0.4
cursor_stop_blinking_after 0
cursor #f5e0dc
cursor_text_color #1e1e2e

# --- [5] THE ELITE TAB BAR ---
# Looks like a high-end browser at the top
tab_bar_edge top
tab_bar_margin_height 10 0
tab_bar_style separator
tab_separator " | "
active_tab_foreground   #11111b
active_tab_background   #007aff
active_tab_font_style   bold
inactive_tab_foreground #6c7086
inactive_tab_background #1e1e2e

# --- [6] INTERACTIVE COOLNESS ---
# When you hover over a link, it glows
url_color #89b4fa
url_style curly
detect_urls yes
show_hyperlink_targets yes
copy_on_select yes

# --- [7] TERMINAL BELL (The "Silent" Wow)
# Instead of a beep, the screen flashes like a camera
visual_bell_duration 0.1
visual_bell_color #313244
enable_audio_bell no

# --- [8] MAC BUTTON COLORS (High Contrast) ---
# Red (Close)
color1 #ff5f56
color9 #ff5f56
# Green (Max)
color2 #27c93f
color10 #27c93f
# Yellow (Min)
color3 #ffbd2e
color11 #ffbd2e
# Blue (Highlight)
color4 #007aff
color12 #007aff

# --- [9] THE LAYOUT MASTER ---
# Press Ctrl+Shift+L to cycle layouts. "Stack" makes one window giant.
enabled_layouts tall,stack,fat,grid
